

services:
  backend:
    build: ./backend
    container_name: voting-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - OPTION_A=Cats
      - OPTION_B=Dogs
      - APP_VERSION=1.0.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: voting-frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: voting-network